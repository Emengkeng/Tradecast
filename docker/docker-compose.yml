env_file:
  - ../.env

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mt4signal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mt4signal
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mt4signal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_critical:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_critical_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis_cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_cache_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file: ../.env
    volumes:
      - ../web:/app/web:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis_critical:
        condition: service_healthy
      redis_cache:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file: ../.env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis_critical:
        condition: service_healthy
      redis_cache:
        condition: service_healthy

volumes:
  postgres_data:
  redis_critical_data:
  redis_cache_data:

networks:
  backend:
    driver: bridge